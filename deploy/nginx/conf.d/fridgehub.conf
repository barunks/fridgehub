# ─────────────────────────────────────────────────────────────────────────────
# FridgeHub — Nginx Site Config
# Replace DOMAIN_PLACEHOLDER with your actual domain before deploying.
# The deploy.sh script does this automatically via sed.
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_PLACEHOLDER;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name DOMAIN_PLACEHOLDER;

    # ── SSL certificates (managed by Certbot) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://DOMAIN_PLACEHOLDER; manifest-src 'self'; worker-src 'self';" always;

    # ── Frontend (React SPA served from frontend container) ────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SPA fallback handled inside frontend nginx
        proxy_intercept_errors off;
    }

    # ── Static assets — long cache (Vite fingerprints filenames) ──────────
    location ~* ^/assets/ {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # ── PWA service worker — never cache ──────────────────────────────────
    location = /sw.js {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── PWA manifest ──────────────────────────────────────────────────────
    location = /manifest.json {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public";
    }

    # ── Backend API (all /api/ and /health routes) ─────────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_buffering       off;
    }

    # ── Auth endpoints — stricter rate limit ──────────────────────────────
    location ~ ^/api/v1/auth/(login|signup) {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health check (no rate limit, no auth) ─────────────────────────────
    location = /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Block hidden files and backup files ───────────────────────────────
    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~ ~$  { deny all; access_log off; log_not_found off; }
}
