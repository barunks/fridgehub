services:
  mysql:
    image: mysql:8.0
    container_name: fridgehub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: fridgehub_db
      MYSQL_USER: fridgehub_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fridgehub-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend_migrate:
    build: ./backend
    container_name: fridgehub-backend-migrate
    command: alembic upgrade head
    environment:
      DATABASE_URL: mysql+mysqlconnector://fridgehub_user:${MYSQL_PASSWORD:?set MYSQL_PASSWORD}@mysql:3306/fridgehub_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      ENVIRONMENT: production
      AUTH_COOKIE_SECURE: "true"
      SEED_ON_STARTUP: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: fridgehub-backend
    environment:
      DATABASE_URL: mysql+mysqlconnector://fridgehub_user:${MYSQL_PASSWORD:?set MYSQL_PASSWORD}@mysql:3306/fridgehub_db
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      SEED_ON_STARTUP: "false"
      RUN_MIGRATIONS_ON_STARTUP: "false"
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      ENVIRONMENT: production
      AUTH_COOKIE_SECURE: "true"
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_VERIFY_SID: ${TWILIO_VERIFY_SID:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      LOGIN_RATE_LIMIT_PER_MINUTE: ${LOGIN_RATE_LIMIT_PER_MINUTE:-10}
    ports:
      - "8000:8000"
    depends_on:
      backend_migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  celery_worker:
    build: ./backend
    container_name: fridgehub-celery-worker
    environment:
      DATABASE_URL: mysql+mysqlconnector://fridgehub_user:${MYSQL_PASSWORD:?set MYSQL_PASSWORD}@mysql:3306/fridgehub_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_VERIFY_SID: ${TWILIO_VERIFY_SID:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    command: celery -A app.tasks.celery_app worker --loglevel=info
    depends_on:
      backend:
        condition: service_healthy

  celery_beat:
    build: ./backend
    container_name: fridgehub-celery-beat
    environment:
      DATABASE_URL: mysql+mysqlconnector://fridgehub_user:${MYSQL_PASSWORD:?set MYSQL_PASSWORD}@mysql:3306/fridgehub_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
    command: celery -A app.tasks.celery_app beat --loglevel=info
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: fridgehub-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
