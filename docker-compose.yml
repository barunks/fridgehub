services:
  mysql:
    image: mysql:8.0
    container_name: familyhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: familyhub_db
      MYSQL_USER: familyhub_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: familyhub-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: familyhub-backend
    environment:
      DATABASE_URL: mysql+mysqlconnector://familyhub_user:${MYSQL_PASSWORD:?set MYSQL_PASSWORD}@mysql:3306/familyhub_db
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      SEED_ON_STARTUP: "true"
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: ./backend
    container_name: familyhub-celery-worker
    environment:
      DATABASE_URL: mysql+mysqlconnector://familyhub_user:${MYSQL_PASSWORD:?set MYSQL_PASSWORD}@mysql:3306/familyhub_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A app.tasks.celery_app worker --loglevel=info
    depends_on:
      backend:
        condition: service_started

  celery_beat:
    build: ./backend
    container_name: familyhub-celery-beat
    environment:
      DATABASE_URL: mysql+mysqlconnector://familyhub_user:${MYSQL_PASSWORD:?set MYSQL_PASSWORD}@mysql:3306/familyhub_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A app.tasks.celery_app beat --loglevel=info
    depends_on:
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: familyhub-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
